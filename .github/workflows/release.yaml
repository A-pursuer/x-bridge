# Release 构建流水线（fork 供应链固化）。
#
# 触发：推送 v* 标签（例如 v0.8.4-fork.1）。
#
# 设计要点：
#   1) 不执行 `make web`——前端产物 internal/web/dist/ 已提交入仓，
#      直接复用可以避免 CI 期间从 npm registry 引入未经审计的新依赖，
#      保证 Release 二进制 == 仓库中已审计源码的确定性产物。
#   2) 复用 Makefile 的 build-* / release-tars 目标：产出
#      xboard-xui-bridge-{linux-amd64,linux-arm64,linux-arm}.tar.gz
#      + SHA256SUMS.txt，与 install.sh 的下载/校验约定完全匹配。
#   3) 版本号经 VERSION=<tag> 注入 main.version，安装后
#      `xboard-xui-bridge version` 可直接对照 Release 页核验。
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binaries (reuse committed web dist)
        run: make build-linux build-arm64 build-arm VERSION=${{ github.ref_name }}

      - name: Package tarballs + SHA256SUMS.txt
        run: make release-tars

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-release/*.tar.gz
            dist-release/SHA256SUMS.txt
