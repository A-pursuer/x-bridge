# 持续集成：每次 push / PR 跑静态检查 + 单元测试。
#
# 与 release.yaml 分离：CI 只做质量门禁（vet + test），不构建产物、不发版。
# 前端产物 internal/web/dist/ 已提交入仓，go build/test 直接可用，无需 Node。
name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...
